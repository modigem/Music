<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aura Music</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#04080f;
  --c1:#0ea5e9;
  --c2:#38bdf8;
  --c3:#06b6d4;
  --glass:rgba(255,255,255,0.055);
  --glass-s:rgba(255,255,255,0.075);
  --glass-b:rgba(255,255,255,0.11);
  --glass-h:rgba(255,255,255,0.09);
  --text:#e8f4ff;
  --muted:rgba(232,244,255,0.5);
  --dim:rgba(232,244,255,0.25);
  --blur:blur(48px) saturate(200%);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* AMBIENT */
#amb{position:fixed;inset:0;z-index:0;transition:background 2s ease;
  background:
    radial-gradient(ellipse 70% 55% at 5% 0%,rgba(14,165,233,0.28) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 95% 95%,rgba(6,182,212,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 80% 40% at 50% 50%,rgba(56,189,248,0.06) 0%,transparent 60%),
    #04080f;}
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.028;}

/* ROOT */
#root{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* TOPBAR */
#topbar{flex-shrink:0;padding:14px 14px 11px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.05);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--glass-b);}
#logo{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.5px;flex-shrink:0;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9,#7dd3fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#search-bar{flex:1;display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.11);
  border-radius:13px;padding:0 12px;height:40px;transition:all .25s;}
#search-bar:focus-within{background:rgba(255,255,255,0.11);border-color:rgba(14,165,233,0.45);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
#si{font-size:14px;opacity:.35;flex-shrink:0;margin-right:8px;}
#sinp{background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font);width:100%;}
#sinp::placeholder{color:var(--dim);}
#sbtn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(14,165,233,0.38);transition:all .2s;}
#sbtn:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(14,165,233,0.55);}
#sbtn:active{transform:scale(.92);}

/* BODY */
#body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;scrollbar-width:none;}
#body::-webkit-scrollbar{display:none;}

/* CHIPS */
#chips{display:flex;gap:7px;padding:12px 14px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 15px;border-radius:999px;font-size:12px;font-weight:500;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font);}
.chip:hover{background:rgba(255,255,255,0.11);color:var(--text);}
.chip.on{background:rgba(14,165,233,0.18);border-color:rgba(14,165,233,0.45);color:#7dd3fc;
  box-shadow:0 4px 14px rgba(14,165,233,0.12);}

/* SEC LABEL */
.slbl{font-family:'Syne',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:1.1px;
  text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:8px;padding:6px 14px 10px;}
.slbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(14,165,233,0.18),transparent);}

/* SONG ROW */
.sr{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;
  border-left:2.5px solid transparent;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  position:relative;animation:fu .38s cubic-bezier(.34,1.56,.64,1) both;}
.sr:hover{background:rgba(255,255,255,0.045);border-left-color:rgba(14,165,233,0.3);}
.sr:active{transform:scale(.99);}
.sr.active{background:rgba(14,165,233,0.08);border-left-color:#0ea5e9;}
.sr.active .stitle{color:#7dd3fc;}

/* divider */
.sdiv{height:1px;margin:0 14px;background:linear-gradient(90deg,rgba(14,165,233,0.12),rgba(255,255,255,0.04),transparent);}

/* thumbnail */
.sthumb{width:52px;height:52px;border-radius:13px;flex-shrink:0;overflow:hidden;
  background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;box-shadow:0 5px 18px rgba(0,0,0,0.35);
  transition:box-shadow .25s;}
.sthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.sr.active .sthumb{box-shadow:0 5px 22px rgba(14,165,233,0.3);}
.splay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;
  font-size:17px;border-radius:13px;transition:background .18s;opacity:0;}
.sr:hover .splay{background:rgba(0,0,0,0.3);opacity:1;}

/* info */
.smeta{flex:1;min-width:0;}
.stitle{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;transition:color .2s;}
.sartist{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* right */
.sright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sdur{font-size:11px;color:var(--dim);}
.slbtn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px;transition:all .2s;}
.slbtn:hover{transform:scale(1.25);}
.slbtn.lk{color:#f43f5e;}

/* playing bars */
.pbars{display:none;gap:2px;align-items:flex-end;height:16px;}
.sr.active .pbars{display:flex;}
.sr.active .sdur{display:none;}
.pbar{width:3px;background:linear-gradient(to top,#0ea5e9,#7dd3fc);border-radius:2px;animation:bb .8s ease-in-out infinite alternate;}
.pbar:nth-child(2){animation-delay:.2s;}.pbar:nth-child(3){animation-delay:.4s;}
@keyframes bb{from{height:3px}to{height:16px}}

/* skeleton */
.skr{display:flex;align-items:center;gap:12px;padding:11px 14px;}
.skt{width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,0.06);flex-shrink:0;animation:shim 1.4s ease-in-out infinite;}
.ski{flex:1;display:flex;flex-direction:column;gap:8px;}
.skl{height:10px;border-radius:5px;background:rgba(255,255,255,0.06);animation:shim 1.4s ease-in-out infinite;}
@keyframes shim{0%,100%{opacity:.4}50%{opacity:1}}

/* empty */
#esl{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;}
.esi{font-size:48px;}.est{font-size:15px;font-weight:600;color:var(--muted);}.ess{font-size:12.5px;color:var(--dim);text-align:center;line-height:1.7;}

/* MINI PLAYER */
#mp{flex-shrink:0;margin:10px 12px 0;
  background:rgba(14,165,233,0.07);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(14,165,233,0.22);border-radius:20px;
  padding:11px 13px;display:none;align-items:center;gap:11px;
  box-shadow:0 6px 28px rgba(14,165,233,0.1);position:relative;overflow:hidden;
  animation:fu .4s ease;}
#mp::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(14,165,233,0.06),rgba(6,182,212,0.03));}
#mpa{width:44px;height:44px;border-radius:11px;flex-shrink:0;background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;position:relative;
  box-shadow:0 4px 14px rgba(0,0,0,0.4);}
#mpa img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
#mpi{flex:1;min-width:0;position:relative;}
#mpt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#mpar{font-size:11px;color:var(--muted);margin-top:2px;}
#mpc{display:flex;align-items:center;gap:5px;flex-shrink:0;position:relative;}
.mcb{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;
  padding:4px;transition:all .18s;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.mcb:hover{color:var(--text);background:rgba(255,255,255,0.08);}
.mcb:active{transform:scale(.88);}
#mpp{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(14,165,233,0.45);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
#mpp:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(14,165,233,0.6);}
#mpp:active{transform:scale(.92);}
#mpb{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.07);border-radius:0 0 20px 20px;}
#mpf{height:100%;background:linear-gradient(90deg,#0ea5e9,#38bdf8);border-radius:999px;width:0%;transition:width .5s linear;}
#vbtn{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid rgba(14,165,233,0.3);
  background:rgba(14,165,233,0.12);color:#7dd3fc;font-size:11px;
  cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s;}
#vbtn:hover{background:rgba(14,165,233,0.22);}

/* NAVBAR */
#nb{flex-shrink:0;margin:10px 12px 16px;
  background:rgba(255,255,255,0.065);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,0.11);border-radius:22px;
  padding:7px;display:flex;
  box-shadow:0 8px 40px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.07);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;border-radius:16px;cursor:pointer;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);border:1px solid transparent;
  font-size:10px;color:var(--muted);font-weight:500;}
.ni .nic{font-size:21px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.ni:hover{color:var(--text);background:rgba(255,255,255,0.055);}
.ni:hover .nic{transform:scale(1.12);}
.ni.on{background:rgba(14,165,233,0.14);border-color:rgba(14,165,233,0.28);color:#7dd3fc;
  box-shadow:0 4px 16px rgba(14,165,233,0.1);}
.ni.on .nic{transform:scale(1.08);}

/* FLOATING VIDEO */
#vf{position:fixed;bottom:104px;right:12px;z-index:500;width:240px;border-radius:16px;overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.09);display:none;}
#vf.show{display:block;animation:fu .3s ease;}
#vif{width:100%;height:135px;display:block;border:none;}
#vcl{position:absolute;top:7px;right:7px;width:24px;height:24px;
  background:rgba(0,0,0,.65);border:none;color:#fff;border-radius:50%;
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;z-index:9999;
  transform:translateX(-50%) translateY(18px);
  background:rgba(6,12,22,.93);backdrop-filter:blur(20px);
  border:1px solid rgba(14,165,233,0.18);border-radius:14px;
  padding:10px 18px;font-size:13px;color:var(--text);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  opacity:0;pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 40px rgba(0,0,0,.6);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="amb"></div>
<div id="vf"><button id="vcl">✕</button><iframe id="vif" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>
<div id="toast"></div>

<div id="root">
  <!-- TOPBAR -->
  <div id="topbar">
    <div id="logo">✦ Aura</div>
    <div id="search-bar">
      <span id="si">🔍</span>
      <input id="sinp" type="text" placeholder="Cari lagu, artis…" autocomplete="off" spellcheck="false">
    </div>
    <button id="sbtn">↗</button>
  </div>

  <!-- SCROLL BODY -->
  <div id="body">
    <!-- CHIPS -->
    <div id="chips">
      <span class="chip on" data-q="top hits 2024" data-p="0">🔥 Top Hits</span>
      <span class="chip" data-q="pop music trending 2024" data-p="1">💫 Pop</span>
      <span class="chip" data-q="hip hop rap 2024" data-p="2">🎤 Hip-Hop</span>
      <span class="chip" data-q="phonk music 2024" data-p="3">⚡ Phonk</span>
      <span class="chip" data-q="lofi chill beats study" data-p="4">🎋 Lo-Fi</span>
      <span class="chip" data-q="electronic dance EDM 2024" data-p="5">🎛 EDM</span>
      <span class="chip" data-q="rnb soul 2024" data-p="6">🎶 R&B</span>
      <span class="chip" data-q="kpop 2024" data-p="7">🌸 K-Pop</span>
      <span class="chip" data-q="anime ost 2024" data-p="8">⛩ Anime</span>
      <span class="chip" data-q="rock indie 2024" data-p="9">🎸 Rock</span>
    </div>

    <!-- LABEL -->
    <div class="slbl" id="slbl">🔥 Top Hits</div>

    <!-- LIST -->
    <div id="sl"></div>
    <div id="esl">
      <div class="esi">🎶</div>
      <div class="est">Kosong nih…</div>
      <div class="ess">Coba search lagu atau pilih genre di atas!</div>
    </div>
  </div>

  <!-- MINI PLAYER -->
  <div id="mp">
    <div id="mpa">🎵<img id="mpimg" src="" alt=""></div>
    <div id="mpi">
      <div id="mpt">Belum ada lagu</div>
      <div id="mpar">—</div>
    </div>
    <div id="mpc">
      <button class="mcb" id="mprv">⏮</button>
      <button id="mpp">▶</button>
      <button class="mcb" id="mpnx">⏭</button>
      <button id="vbtn">📺</button>
    </div>
    <div id="mpb"><div id="mpf"></div></div>
  </div>

  <!-- NAVBAR -->
  <div id="nb">
    <div class="ni on" data-t="rec"><span class="nic">✦</span><span>For You</span></div>
    <div class="ni" data-t="pl"><span class="nic">📋</span><span>Playlist</span></div>
    <div class="ni" data-t="hist"><span class="nic">🕓</span><span>History</span></div>
    <div class="ni" data-t="lk"><span class="nic">❤️</span><span>Liked</span></div>
  </div>
</div>

<script>
// ══════════════════
//  AURA ENGINE
// ══════════════════
const INV=['https://inv.nadeko.net','https://invidious.fdn.fr','https://invidious.privacyredirect.com','https://yt.cdaut.de','https://iv.datura.network'];
let invI=0;

let tracks=[],curI=-1,playing=false,vidOn=false,curTab='rec';
let liked=JSON.parse(localStorage.getItem('aura_lk')||'[]');
let playlist=JSON.parse(localStorage.getItem('aura_pl')||'[]');
let history=JSON.parse(localStorage.getItem('aura_hi')||'[]');
let ytP=null,ytOk=false,pgTimer=null;

// Palettes for each chip
const PALS=[
  ['14,165,233','56,189,248'],  // blue
  ['168,85,247','196,148,255'], // purple
  ['239,68,68','249,115,22'],   // red-orange
  ['234,179,8','251,191,36'],   // yellow
  ['34,197,94','16,185,129'],   // green
  ['99,102,241','129,140,248'], // indigo
  ['236,72,153','244,114,182'], // pink
  ['244,114,182','251,146,60'], // rose-orange
  ['251,191,36','250,204,21'],  // yellow-gold
  ['239,68,68','156,163,175'],  // red-gray
];

function setAmb(pi){
  const p=PALS[pi%PALS.length];
  document.getElementById('amb').style.background=
    `radial-gradient(ellipse 70% 55% at 5% 0%,rgba(${p[0]},0.28) 0%,transparent 55%),
     radial-gradient(ellipse 60% 60% at 95% 95%,rgba(${p[1]},0.18) 0%,transparent 55%),
     radial-gradient(ellipse 80% 40% at 50% 50%,rgba(${p[0]},0.06) 0%,transparent 60%),
     #04080f`;
  const hex=rgbToHex(p[0]);
  document.documentElement.style.setProperty('--c1',`rgb(${p[0]})`);
  document.documentElement.style.setProperty('--c2',`rgb(${p[1]})`);
}
function rgbToHex(rgb){return '#'+rgb.split(',').map(x=>parseInt(x.trim()).toString(16).padStart(2,'0')).join('');}

// YT API
window.onYouTubeIframeAPIReady=()=>{
  ytP=new YT.Player('vif',{
    height:'135',width:'240',
    playerVars:{autoplay:1,controls:1,modestbranding:1,rel:0,iv_load_policy:3,fs:0},
    events:{
      onReady:()=>{ytOk=true;},
      onStateChange:e=>{
        if(e.data===YT.PlayerState.PLAYING){setPlay(true);startPg();}
        else if(e.data===YT.PlayerState.PAUSED){setPlay(false);clearInterval(pgTimer);}
        else if(e.data===YT.PlayerState.ENDED){clearInterval(pgTimer);doNext(true);}
      }
    }
  });
};
const ys=document.createElement('script');ys.src='https://www.youtube.com/iframe_api';document.head.appendChild(ys);

// SEARCH
let sc=null;
async function doSearch(q){
  if(!q.trim())return;
  showSkel();
  if(sc)sc.abort();sc=new AbortController();
  let res=null;
  for(let i=0;i<INV.length;i++){
    const base=INV[(invI+i)%INV.length];
    try{
      const r=await fetch(`${base}/api/v1/search?q=${encodeURIComponent(q)}&type=video&fields=videoId,title,author,lengthSeconds,videoThumbnails`,{signal:sc.signal});
      if(!r.ok)throw new Error();
      res=await r.json();invI=(invI+i)%INV.length;break;
    }catch(e){if(e.name==='AbortError')return;}
  }
  if(!res){toast('❌ Gagal connect, coba lagi!');hideSkel();return;}
  tracks=res.filter(t=>t.videoId).map(t=>({
    id:t.videoId,title:t.title,artist:t.author,dur:t.lengthSeconds,
    thumb:(t.videoThumbnails?.find(x=>x.quality==='medium')||t.videoThumbnails?.[0])?.url||''
  }));
  renderList(tracks);
}

// RENDER
function renderList(list){
  const c=document.getElementById('sl'),e=document.getElementById('esl');
  hideSkel();c.innerHTML='';
  if(!list.length){e.style.display='flex';c.style.display='none';return;}
  e.style.display='none';c.style.display='block';
  list.forEach((t,i)=>{
    const lk=liked.some(l=>l.id===t.id);
    const act=curI>=0&&tracks[curI]?.id===t.id;
    const row=document.createElement('div');
    row.className='sr'+(act?' active':'');
    row.dataset.id=t.id;
    row.style.animationDelay=(i*.04)+'s';
    row.innerHTML=`
      <div class="sthumb">
        ${t.thumb?`<img src="${t.thumb}" alt="" loading="lazy" onerror="this.style.display='none'">`:'🎵'}
        <div class="splay">▶</div>
      </div>
      <div class="smeta">
        <div class="stitle">${esc(t.title)}</div>
        <div class="sartist">${esc(t.artist)}</div>
      </div>
      <div class="sright">
        <div class="pbars"><div class="pbar" style="height:4px"></div><div class="pbar" style="height:10px"></div><div class="pbar" style="height:6px"></div></div>
        <div class="sdur">${fmtS(t.dur)}</div>
        <button class="slbtn${lk?' lk':''}" data-id="${t.id}">${lk?'♥':'♡'}</button>
      </div>`;
    row.addEventListener('click',ev=>{
      if(ev.target.classList.contains('slbtn'))return;
      const ri=tracks.indexOf(t);
      if(ri>=0)playAt(ri);else{tracks=list;playAt(i);}
    });
    row.querySelector('.slbtn').addEventListener('click',ev=>{ev.stopPropagation();toggleLk(t,ev.currentTarget);});
    c.appendChild(row);
    if(i<list.length-1){const d=document.createElement('div');d.className='sdiv';c.appendChild(d);}
  });
}

function showSkel(){
  const c=document.getElementById('sl');
  c.innerHTML=Array(8).fill(0).map((_,i)=>`
    <div class="skr" style="animation-delay:${i*.05}s">
      <div class="skt"></div>
      <div class="ski">
        <div class="skl" style="width:${60+Math.random()*35}%"></div>
        <div class="skl" style="width:${30+Math.random()*30}%"></div>
      </div>
    </div>`).join('');
  document.getElementById('esl').style.display='none';
}
function hideSkel(){document.getElementById('sl').innerHTML='';}

// PLAYBACK
function playAt(idx){
  if(idx<0||idx>=tracks.length)return;
  curI=idx;const t=tracks[idx];
  if(!ytOk){toast('⏳ Player loading…');return;}
  ytP.loadVideoById(t.id);
  updPlayer(t);addHist(t);hilite(t.id);
  const mp=document.getElementById('mp');mp.style.display='flex';
}
function updPlayer(t){
  document.getElementById('mpt').textContent=t.title;
  document.getElementById('mpar').textContent=t.artist;
  const img=document.getElementById('mpimg');
  if(t.thumb){img.src=t.thumb;img.style.display='block';document.getElementById('mpa').style.fontSize='0';}
  else{img.style.display='none';document.getElementById('mpa').style.fontSize='20px';}
  document.title=t.title+' — Aura';
}
function setPlay(s){playing=s;document.getElementById('mpp').textContent=s?'⏸':'▶';}
function startPg(){
  clearInterval(pgTimer);
  pgTimer=setInterval(()=>{
    try{const c=ytP.getCurrentTime()||0,d=ytP.getDuration()||0;
      if(d)document.getElementById('mpf').style.width=(c/d*100)+'%';}catch(e){}
  },500);
}
function doNext(fe=false){
  if(!tracks.length)return;
  if(fe&&tracks.length===1)return;
  playAt((curI+1)%tracks.length);
}
function doPrev(){
  try{if(ytP&&ytP.getCurrentTime()>3){ytP.seekTo(0);return;}}catch(e){}
  playAt((curI-1+tracks.length)%tracks.length);
}
function hilite(id){document.querySelectorAll('.sr').forEach(r=>r.classList.toggle('active',r.dataset.id===id));}

// LIKED
function toggleLk(t,btn){
  const i=liked.findIndex(l=>l.id===t.id);
  if(i>=0){liked.splice(i,1);btn.textContent='♡';btn.classList.remove('lk');toast('💔 Dihapus dari Liked');}
  else{liked.unshift({...t});btn.textContent='♥';btn.classList.add('lk');toast('❤️ Ditambahkan ke Liked!');}
  localStorage.setItem('aura_lk',JSON.stringify(liked));
  if(curTab==='lk')renderTab('lk');
}

// PLAYLIST
function addToPl(t){
  if(playlist.find(p=>p.id===t.id)){toast('⚠️ Sudah ada di playlist!');return;}
  playlist.unshift({...t});
  localStorage.setItem('aura_pl',JSON.stringify(playlist));
  toast('📋 Ditambahkan ke Playlist!');
  if(curTab==='pl')renderTab('pl');
}

// HISTORY
function addHist(t){
  history=history.filter(h=>h.id!==t.id);
  history.unshift({...t,ts:Date.now()});
  if(history.length>60)history=history.slice(0,60);
  localStorage.setItem('aura_hi',JSON.stringify(history));
  if(curTab==='hist')renderTab('hist');
}

// TAB RENDER
function renderTab(tab){
  const map={lk:['❤️ Liked Songs',liked],pl:['📋 My Playlist',playlist],hist:['🕓 History',history]};
  const[lbl,list]=map[tab];
  document.getElementById('slbl').textContent=lbl;
  document.getElementById('chips').style.display='none';
  const tmp=tracks;tracks=list;renderList(list);
  // override click to use list
  document.querySelectorAll('.sr').forEach((row,i)=>{
    row.addEventListener('click',ev=>{
      if(ev.target.classList.contains('slbtn'))return;
      tracks=list;playAt(i);
    },{once:true});
  });
}
function showRec(){
  document.getElementById('chips').style.display='flex';
  const ac=document.querySelector('.chip.on');
  document.getElementById('slbl').textContent=(ac?ac.textContent.trim():'🔥 Top Hits');
  if(!tracks.length||curTab!=='rec')doSearch(ac?.dataset.q||'top hits 2024');
  else renderList(tracks);
}

// CHIP CLICK
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  setAmb(parseInt(c.dataset.p)||0);
  document.getElementById('slbl').textContent=c.textContent.trim();
  doSearch(c.dataset.q);
});

// NAV CLICK
document.getElementById('nb').addEventListener('click',e=>{
  const item=e.target.closest('.ni');if(!item)return;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  item.classList.add('on');
  curTab=item.dataset.t;
  if(curTab==='rec')showRec();
  else renderTab(curTab);
});

// CONTROLS
document.getElementById('sbtn').addEventListener('click',()=>doSearch(document.getElementById('sinp').value));
document.getElementById('sinp').addEventListener('keydown',e=>{if(e.key==='Enter'){curTab='rec';document.querySelector('.ni[data-t=rec]').click();doSearch(e.target.value);}});
document.getElementById('mpp').addEventListener('click',()=>{if(!ytOk)return;try{playing?ytP.pauseVideo():ytP.playVideo();}catch(e){}});
document.getElementById('mpnx').addEventListener('click',()=>doNext());
document.getElementById('mprv').addEventListener('click',()=>doPrev());
document.getElementById('vbtn').addEventListener('click',()=>{
  vidOn=!vidOn;
  document.getElementById('vf').classList.toggle('show',vidOn);
  toast(vidOn?'📺 Video mode on':'📺 Video off');
  if(vidOn&&ytOk&&curI>=0)ytP.loadVideoById(tracks[curI].id);
});
document.getElementById('vcl').addEventListener('click',()=>{vidOn=false;document.getElementById('vf').classList.remove('show');});

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();document.getElementById('mpp').click();}
  if(e.code==='ArrowRight')try{ytP.seekTo((ytP.getCurrentTime()||0)+5,true);}catch(ex){}
  if(e.code==='ArrowLeft')try{ytP.seekTo(Math.max(0,(ytP.getCurrentTime()||0)-5),true);}catch(ex){}
  if(e.code==='KeyN')doNext();
  if(e.code==='KeyP')doPrev();
});

// SWIPE mini player → video
let ty0=0;
document.getElementById('mp').addEventListener('touchstart',e=>ty0=e.touches[0].clientY,{passive:true});
document.getElementById('mp').addEventListener('touchend',e=>{if(ty0-e.changedTouches[0].clientY>40)document.getElementById('vbtn').click();},{passive:true});

// UTILS
function fmtS(s){if(!s||isNaN(s))return'—';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function esc(s=''){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2400);}

// INIT
setAmb(0);
setTimeout(()=>doSearch('top hits 2024'),700);
</script>
</body>
</html>
